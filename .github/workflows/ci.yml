name: CI

# Infrastructure Audit #1 — monorepo continuous integration gate.
# Does not deploy. Does not touch production secrets.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-tests:
    name: API tests (Laravel)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run test suite
        run: php artisan test

  web-build:
    name: Web build (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint --workspace=apps/web
        continue-on-error: false

      - name: Typecheck
        run: npm run typecheck --workspace=apps/web

      - name: Production build
        run: npm run build --workspace=apps/web
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # CI placeholders only — not production secrets
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_API_URL: 'http://localhost:8000'
          NODE_ENV: production
