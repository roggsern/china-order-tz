name: Deploy Next.js to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy application on VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -euo pipefail

            echo "🚀 Starting deployment..."

            cd /root/china-order-tz

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "⚙️ Setting Node memory..."
            export NODE_OPTIONS="--max-old-space-size=512"

            echo "📦 Installing dependencies..."
            npm ci

            echo "🏗️ Building project..."
            npm run build --workspace=apps/web

            echo "🔄 Restarting PM2..."
            pm2 delete china-order-tz || true
            pm2 start npm --name china-order-tz -- run start:web --workspace=apps/web

            pm2 save

            echo "✅ Deployment completed successfully!"