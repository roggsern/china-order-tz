services:
  mysql:
    image: mysql:8.4
    container_name: china-order-tz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-china_order_tz}
      MYSQL_USER: ${MYSQL_USER:-china_order}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - china-order-tz
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: china-order-tz-api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./apps/api:/var/www/html
    environment:
      APP_NAME: ${APP_NAME:-CHINA ORDER TZ API}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-china_order_tz}
      DB_USERNAME: ${MYSQL_USER:-china_order}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      # Ignored outside local/development — entrypoint never auto-seeds production/staging.
      SEED_DATABASE_ON_BOOT: ${SEED_DATABASE_ON_BOOT:-false}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - china-order-tz

  nginx:
    image: nginx:1.27-alpine
    container_name: china-order-tz-nginx
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:80"
    volumes:
      - ./apps/api:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - china-order-tz

  web:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      target: development
    container_name: china-order-tz-web
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://nginx}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      ADMIN_TOKEN_MAX_AGE_SECONDS: ${ADMIN_TOKEN_MAX_AGE_SECONDS:-28800}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - nginx
    networks:
      - china-order-tz

  # Local queue worker (optional for async NMB callbacks).
  queue:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: china-order-tz-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "database",
        "--sleep=1",
        "--tries=3",
        "--timeout=120",
        "--max-time=3600",
      ]
    volumes:
      - ./apps/api:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-china_order_tz}
      DB_USERNAME: ${MYSQL_USER:-china_order}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - china-order-tz

  scheduler:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: china-order-tz-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./apps/api:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-china_order_tz}
      DB_USERNAME: ${MYSQL_USER:-china_order}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      CACHE_STORE: ${CACHE_STORE:-database}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - china-order-tz

volumes:
  mysql_data:
  web_node_modules:

networks:
  china-order-tz:
    driver: bridge
