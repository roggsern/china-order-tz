services:
  mysql:
    restart: always

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  nginx:
    restart: always

  web:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      target: production
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
