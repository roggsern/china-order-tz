services:
  mysql:
    restart: always

  # Shared production Laravel runtime: project-root `.env` via env_file (APP_KEY, SANCTUM_*,
  # SESSION_*, NMB_*, PAYMENT_*, etc.) plus explicit overrides below so api / queue / scheduler
  # always share the same production configuration.
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: always
    env_file:
      - .env
    environment: &laravel-prod-runtime
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_NAME: ${APP_NAME:-CHINA ORDER TZ API}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      LOG_STACK: ${LOG_STACK:-daily}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-china_order_tz}
      DB_USERNAME: ${MYSQL_USER:-china_order}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      CACHE_STORE: ${CACHE_STORE:-database}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}
      SANCTUM_TOKEN_PREFIX: ${SANCTUM_TOKEN_PREFIX:-}
      PAYMENT_DEFAULT_GATEWAY: ${PAYMENT_DEFAULT_GATEWAY:-nmb}
      PAYMENT_NMB_ENABLED: ${PAYMENT_NMB_ENABLED:-true}
      NMB_WEBHOOK_REQUIRE_SIGNATURE: ${NMB_WEBHOOK_REQUIRE_SIGNATURE:-true}
      NMB_BASE_URL: ${NMB_BASE_URL:-}
      NMB_USERNAME: ${NMB_USERNAME:-}
      NMB_PASSWORD: ${NMB_PASSWORD:-}
      NMB_MERCHANT_ID: ${NMB_MERCHANT_ID:-}
      NMB_CALLBACK_URL: ${NMB_CALLBACK_URL:-}
      QUEUE_RESTART_ON_BOOT: ${QUEUE_RESTART_ON_BOOT:-true}
      OPS_SCHEDULER_STARTUP_GRACE_MINUTES: ${OPS_SCHEDULER_STARTUP_GRACE_MINUTES:-5}
      OPS_SCHEDULER_HEARTBEAT_MAX_AGE_MINUTES: ${OPS_SCHEDULER_HEARTBEAT_MAX_AGE_MINUTES:-10}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_ROOT: ${BACKUP_ROOT:-/var/backups/china-order-tz}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_MONTHLY: ${BACKUP_RETENTION_MONTHLY:-6}
      BACKUP_DAILY_AT: ${BACKUP_DAILY_AT:-02:15}
    volumes:
      - api_storage:/var/www/html/storage
      - app_backups:/var/backups/china-order-tz
    healthcheck:
      test: ["CMD", "php", "artisan", "ops:health-check"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s
    depends_on:
      mysql:
        condition: service_healthy

  # Required when NMB_PROCESS_CALLBACKS_ASYNC=true (default).
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: always
    working_dir: /var/www/html
    env_file:
      - .env
    # --max-time recycles worker; --timeout kills hung jobs; SIGTERM handled by artisan.
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "database",
        "--sleep=1",
        "--tries=3",
        "--timeout=120",
        "--max-time=3600",
        "--memory=256",
      ]
    environment:
      <<: *laravel-prod-runtime
      SKIP_OPTIMIZE: "true"
      QUEUE_RESTART_ON_BOOT: "false"
    volumes:
      - api_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - china-order-tz

  # RC1-G4C1 — long-running scheduler (alternative to host cron).
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: always
    working_dir: /var/www/html
    env_file:
      - .env
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *laravel-prod-runtime
      SKIP_OPTIMIZE: "true"
      QUEUE_RESTART_ON_BOOT: "false"
    volumes:
      - api_storage:/var/www/html/storage
      - app_backups:/var/backups/china-order-tz
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - china-order-tz

  nginx:
    restart: always
    volumes:
      - api_storage:/var/www/html/storage:ro
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      target: production
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://nginx}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  api_storage:
  app_backups:
